<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocktails Wiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C8A96E;
  --gold-dim:#A08454;
  --gold-glow:rgba(200,169,110,0.15);
  --zinc-950:#09090b;
  --zinc-900:#18181b;
  --zinc-800:#27272a;
  --zinc-700:#3f3f46;
  --zinc-600:#52525b;
  --zinc-500:#71717a;
  --zinc-400:#a1a1aa;
  --zinc-300:#d4d4d8;
  --zinc-200:#e4e4e7;
  --zinc-100:#f4f4f5;
  --radius-lg:1.25rem;
  --radius-xl:2rem;
  --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
  --font-display:'Outfit',sans-serif;
  --font-body:'Outfit',sans-serif;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font-body);
  background:var(--zinc-950);
  color:var(--zinc-300);
  overflow-x:hidden;
  line-height:1.6;
  direction:rtl;
  text-align:right;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--zinc-950)}
::-webkit-scrollbar-thumb{background:var(--zinc-700);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

/* ── Hero ── */
.hero{
  position:relative;
  min-height:100dvh;
  display:flex;
  align-items:center;
  padding:0 0 0 0;
  overflow:hidden;
}
.hero-content{margin-top:-5vh}
.hero-video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:0;
  filter:brightness(0.65) saturate(0.8);
}
.hero-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(
    to bottom,
    rgba(9,9,11,0.05) 0%,
    rgba(9,9,11,0.2) 40%,
    rgba(9,9,11,0.75) 80%,
    var(--zinc-950) 100%
  );
}
.hero-content{
  position:relative;z-index:2;
  max-width:1400px;
  width:100%;
  margin:0 auto;
  padding:0 clamp(1.5rem,4vw,4rem);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero-label{
  font-family:var(--font-display);
  font-size:0.75rem;
  font-weight:600;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:1.25rem;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.8s var(--ease-out-expo) 0.3s forwards;
}
.hero-title{
  font-family:var(--font-display);
  font-size:clamp(2.8rem,6.5vw,5.5rem);
  font-weight:800;
  letter-spacing:-0.04em;
  line-height:0.95;
  color:var(--zinc-100);
  margin-bottom:1.5rem;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 0.8s var(--ease-out-expo) 0.5s forwards;
}
.hero-title span{color:var(--gold)}
.hero-sub{
  font-size:clamp(1rem,2vw,1.2rem);
  color:var(--zinc-400);
  max-width:52ch;
  margin:0 auto;
  line-height:1.7;
  font-weight:300;
  text-align:center;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.8s var(--ease-out-expo) 0.7s forwards;
}
.scroll-hint{
  position:absolute;
  bottom:2rem;left:50%;
  transform:translate(-50%, 12px);
  z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  opacity:0;
  animation:scrollHintIn 0.8s var(--ease-out-expo) 1.2s forwards;
}
.scroll-hint span{
  font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--zinc-600);font-family:var(--font-display);font-weight:500;
}
.scroll-line{
  width:1px;height:40px;
  background:linear-gradient(to bottom,var(--gold),transparent);
  animation:scrollPulse 2s ease-in-out infinite;
}

/* ── Stats Bar ── */
.stats-bar{
  background:var(--zinc-900);
  border-top:1px solid rgba(200,169,110,0.1);
  border-bottom:1px solid rgba(200,169,110,0.1);
  padding:1.5rem 0;
}
.stats-inner{
  max-width:1400px;margin:0 auto;
  padding:0 clamp(1.5rem,4vw,4rem);
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:1.5rem;
}
.stat{text-align:center;flex:1;min-width:120px}
.stat-num{
  font-family:var(--font-display);
  font-size:2rem;font-weight:700;
  color:var(--gold);
  line-height:1;
}
.stat-label{
  font-size:0.8rem;
  color:var(--zinc-500);
  margin-top:0.25rem;
  font-weight:400;
}

/* ── Navigation / Filters ── */
.nav-section{
  position:sticky;top:0;z-index:100;
  background:rgba(9,9,11,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(200,169,110,0.08);
  padding:1rem 0;
}
.nav-inner{
  max-width:1400px;margin:0 auto;
  padding:0 clamp(1.5rem,4vw,4rem);
  display:flex;align-items:center;
  justify-content:center;
  gap:1rem;flex-wrap:wrap;
  flex-direction:column;
}
.nav-brand{
  font-family:var(--font-display);
  font-weight:700;font-size:1.1rem;
  color:var(--zinc-100);
  white-space:nowrap;
}
.nav-brand span{color:var(--gold)}
.filter-pills{
  display:flex;gap:0.5rem;flex-wrap:wrap;
  align-items:center;justify-content:center;
  direction:rtl;
}
.pill{
  padding:0.6rem 1.25rem;
  unicode-bidi:plaintext;
  min-height:44px;
  border-radius:100px;
  border:1px solid var(--zinc-800);
  background:transparent;
  color:var(--zinc-400);
  font-family:var(--font-body);
  font-size:0.85rem;
  cursor:pointer;
  transition:all 0.3s var(--ease-out-expo);
  white-space:nowrap;
  display:inline-flex;align-items:center;
}
.pill:hover{
  border-color:var(--gold-dim);
  color:var(--zinc-200);
  background:rgba(200,169,110,0.06);
}
.pill.active{
  background:var(--gold);
  color:var(--zinc-950);
  border-color:var(--gold);
  font-weight:600;
}
.search-box{
  position:relative;
  flex-shrink:0;
}
.search-box input{
  background:var(--zinc-900);
  border:1px solid var(--zinc-800);
  border-radius:100px;
  padding:0.5rem 2.5rem 0.5rem 1.25rem;
  color:var(--zinc-200);
  font-family:var(--font-body);
  font-size:0.85rem;
  width:220px;
  transition:all 0.3s var(--ease-out-expo);
  outline:none;
  direction:rtl;
  text-align:right;
  unicode-bidi:plaintext;
}
.search-box input:focus{
  border-color:var(--gold-dim);
  width:280px;
  box-shadow:0 0 0 3px rgba(200,169,110,0.08);
}
.search-box input::placeholder{color:var(--zinc-600)}
.search-box svg{
  position:absolute;left:0.85rem;top:50%;
  transform:translateY(-50%);
  width:16px;height:16px;
  color:var(--zinc-600);
  pointer-events:none;
}

/* ── Main Grid ── */
.main{
  max-width:1400px;margin:0 auto;
  padding:3rem clamp(1.5rem,4vw,4rem) 6rem;
}
.section-header{
  margin-bottom:2rem;
  padding-bottom:1rem;
  border-bottom:1px solid rgba(200,169,110,0.1);
}
.section-title{
  font-family:var(--font-display);
  font-size:1.5rem;
  font-weight:700;
  color:var(--zinc-100);
  letter-spacing:-0.02em;
}
.section-title span{color:var(--gold)}
.section-count{
  font-size:0.8rem;
  color:var(--zinc-600);
  margin-top:0.25rem;
}
.cocktail-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:1.25rem;
  margin-bottom:3rem;
}
/* All cards uniform size */

/* ── Card ── */
.cocktail-card{
  background:var(--zinc-900);
  border:1px solid var(--zinc-800);
  border-radius:var(--radius-lg);
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.4s var(--ease-out-expo);
  opacity:0;
  transform:translateY(30px);
}
.cocktail-card.visible{
  opacity:1;
  transform:translateY(0);
}
.cocktail-card::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,169,110,0.03),transparent 60%);
  opacity:0;
  transition:opacity 0.4s var(--ease-out-expo);
  z-index:1;
  pointer-events:none;
}
.cocktail-card:hover{
  border-color:rgba(200,169,110,0.25);
  transform:translateY(-3px);
  box-shadow:0 20px 40px -15px rgba(0,0,0,0.4);
}
.cocktail-card:hover::before{opacity:1}
.cocktail-card:hover .card-img img{transform:scale(1.05)}
.cocktail-card:active{transform:translateY(-1px) scale(0.99)}

/* ── Card Image ── */
.card-img{
  position:relative;
  width:100%;
  height:200px;
  overflow:hidden;
  background:var(--zinc-800);
}

.card-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform 0.6s var(--ease-out-expo);
  display:block;
}
.card-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--zinc-900) 0%,transparent 50%);
  pointer-events:none;
}
.card-img-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(90deg,#1a1a1f 25%,#252530 50%,#1a1a1f 75%);
  background-size:200% 100%;
  animation:shimmer 1.8s ease-in-out infinite;
}
@keyframes shimmer{
  0%{background-position:-200% 0}
  100%{background-position:200% 0}
}
.card-img-placeholder svg{
  width:40px;height:40px;
  color:var(--zinc-700);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}

.card-body{
  padding:1.25rem 1.5rem 2.75rem;
  position:relative;
}

.card-top{
  display:flex;justify-content:space-between;
  align-items:flex-start;margin-bottom:0.75rem;
}
.card-name{
  font-family:var(--font-display);
  font-size:1.3rem;
  font-weight:700;
  color:var(--zinc-100);
  letter-spacing:-0.02em;
  line-height:1.2;
}
.difficulty{
  padding:0.2rem 0.7rem;
  border-radius:100px;
  font-size:0.68rem;
  font-weight:600;
  letter-spacing:0.05em;
  text-transform:uppercase;
  white-space:nowrap;
  flex-shrink:0;
  margin-left:0.75rem;
}
.difficulty.easy{background:rgba(251,191,36,0.1);color:#FBBF24;border:1px solid rgba(251,191,36,0.15)}
.difficulty.medium{background:rgba(245,158,11,0.1);color:#F59E0B;border:1px solid rgba(245,158,11,0.15)}
.difficulty.hard{background:rgba(248,113,113,0.1);color:#F87171;border:1px solid rgba(248,113,113,0.15)}

.card-desc{
  font-size:0.85rem;
  color:var(--zinc-500);
  margin-bottom:1rem;
  line-height:1.6;
  font-weight:300;
}
.card-ingredients{
  display:flex;flex-wrap:wrap;gap:0.35rem;
  margin-bottom:1rem;
}
.ingredient-tag{
  padding:0.2rem 0.6rem;
  border-radius:6px;
  font-size:0.72rem;
  background:rgba(200,169,110,0.06);
  color:var(--gold);
  border:1px solid rgba(200,169,110,0.1);
  font-weight:400;
}

.card-meters{
  display:flex;gap:1rem;
  padding-top:0.75rem;
  border-top:1px solid var(--zinc-800);
}
.meter{flex:1}
.meter-label{
  font-size:0.62rem;
  color:var(--zinc-600);
  margin-bottom:0.3rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:500;
}
.meter-bar{
  height:3px;
  background:var(--zinc-800);
  border-radius:2px;
  overflow:hidden;
}
.meter-fill{
  height:100%;
  background:var(--gold);
  border-radius:2px;
  transition:width 0.8s var(--ease-out-expo);
  width:0;
}
.meter-fill.loaded{width:var(--val)}

/* ── Expanded Card (Recipe) ── */
.card-recipe{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.5s var(--ease-out-expo),
             padding 0.3s var(--ease-out-expo),
             opacity 0.3s ease;
  opacity:0;
}
.cocktail-card.expanded .card-recipe{
  max-height:800px;
  padding-top:1rem;
  padding-bottom:0.25rem;
  opacity:1;
}
.recipe-section-title{
  font-family:var(--font-display);
  font-size:0.75rem;
  font-weight:600;
  color:var(--gold);
  text-transform:uppercase;
  letter-spacing:0.12em;
  margin-bottom:0.5rem;
}
.recipe-ingredients-list{
  list-style:none;
  margin-bottom:1.25rem;
}
.recipe-ingredients-list li{
  font-size:0.85rem;
  color:var(--zinc-300);
  padding:0.35rem 0;
  border-bottom:1px solid rgba(63,63,70,0.3);
  display:flex;justify-content:space-between;
}
.recipe-ingredients-list li:last-child{border-bottom:none}
.recipe-ingredients-list .amount{
  color:var(--gold);
  font-weight:500;
}
.recipe-steps{
  list-style:none;
  counter-reset:step;
}
.recipe-steps li{
  font-size:0.85rem;
  color:var(--zinc-400);
  padding-block:0.5rem;
  padding-inline-start:2.2rem;
  padding-inline-end:0;
  position:relative;
  counter-increment:step;
  font-weight:300;
}
.recipe-steps li::before{
  content:counter(step);
  position:absolute;
  inset-inline-start:0;
  top:0.5rem;
  width:1.4rem;height:1.4rem;
  border-radius:50%;
  background:rgba(200,169,110,0.1);
  color:var(--gold);
  font-size:0.7rem;
  font-weight:600;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);
}

/* ── Footer ── */
.footer{
  border-top:1px solid var(--zinc-800);
  padding:3rem 0;
  text-align:center;
}
.footer p{
  font-size:0.8rem;
  color:var(--zinc-600);
  font-weight:300;
}
.footer span{color:var(--gold);font-weight:500}

/* ── Animations ── */
@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}
@keyframes scrollPulse{
  0%,100%{opacity:0.3;transform:scaleY(0.6)}
  50%{opacity:1;transform:scaleY(1)}
}
@keyframes scrollHintIn{
  to{opacity:1;transform:translate(-50%, 0)}
}

/* ── No Results ── */
.no-results{
  text-align:center;
  padding:4rem 2rem;
  color:var(--zinc-600);
  font-size:1rem;
  grid-column:1/-1;
}

/* ── Responsive ── */
@media(max-width:768px){

  .cocktail-grid{grid-template-columns:1fr}
  .nav-inner{flex-direction:column;align-items:center}
  .filter-pills{
    flex-wrap:wrap;
    justify-content:center;
    align-content:center;
    width:100%;
    padding-bottom:0;
    overflow-x:visible;
    row-gap:0.5rem;
  }
  .search-box{width:90%;max-width:400px}
  .search-box input{width:100%}
  .search-box input:focus{width:100%}
  .stats-inner{justify-content:center}
  .hero{min-height:100svh;align-items:center;padding:0}
  .hero-content{text-align:center}
  .hero-sub{margin:0 auto}
}
@media(max-width:480px){
  .cocktail-grid{grid-template-columns:1fr}
  .card-img{height:180px!important}
}

/* ── Focus Indicators ── */
button:focus-visible,
[role="button"]:focus-visible,
input:focus-visible{
  outline:2px solid #D4A853;
  outline-offset:2px;
}

/* ── Tactile Press ── */
button:active,[role="button"]:active{
  transform:scale(0.97);
  transition-duration:0.08s;
}

/* ── Card Expand Chevron ── */
.card-chevron{
  position:absolute;
  bottom:0.65rem;
  left:50%;
  transform:translateX(-50%);
  width:20px;height:20px;
  flex-shrink:0;
  color:var(--zinc-600);
  transition:transform 0.3s var(--ease-out-expo),color 0.3s;
  z-index:3;
  pointer-events:none;
}
.cocktail-card.expanded .card-chevron{transform:translateX(-50%) rotate(180deg);color:var(--gold)}

/* ── Back to Top ── */
.back-to-top{
  position:fixed;bottom:2rem;left:2rem;
  width:44px;height:44px;
  border-radius:50%;
  background:var(--gold);
  color:var(--zinc-950);
  border:none;
  font-size:1.2rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transform:translateY(10px);
  transition:all 0.3s var(--ease-out-expo);
  z-index:99;
  box-shadow:0 4px 20px rgba(200,169,110,0.3);
}
.back-to-top.visible{opacity:1;transform:translateY(0)}
.back-to-top:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(200,169,110,0.4)}

/* ── Grain Overlay ── */
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;
  background-size:256px 256px;
}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="bg-video.mp4" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p style="font-family:var(--font-display);font-size:clamp(1.5rem,3.5vw,2.5rem);font-weight:300;color:var(--zinc-200);text-align:center;unicode-bidi:plaintext">
      What type of cocktail do you want to make today?
    </p>
  </div>
  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>


<!-- NAV / FILTERS -->
<nav class="nav-section">
  <div class="nav-inner">
    <div class="filter-pills" role="group" aria-label="סינון לפי קטגוריה">
      <button class="pill active" data-filter="all">הכל</button>
      <button class="pill" data-filter="strong">חזק ומר</button>
      <button class="pill" data-filter="sweet">מתוק וקרמי</button>
      <button class="pill" data-filter="sour">חמוץ ומרענן</button>
      <button class="pill" data-filter="fruity">פירותי וטרופי</button>
    </div>
    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" dir="rtl" placeholder="חפש קוקטייל…" aria-label="חיפוש קוקטייל" autocomplete="off">
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="mainContent"></main>

<!-- FOOTER -->
<footer class="footer">
  <p dir="rtl">אנציקלופדיית קוקטיילים</p>
</footer>

<script>
// ═══════════════════════════════════════
//  COCKTAIL DATA — 50 Recipes
// ═══════════════════════════════════════
const cocktails = [
  // ── חזק ומר ──
  {name:"Negroni",category:"strong",desc:"שילוש מושלם של מרירות, מתיקות ובוטניקה.",difficulty:"easy",sweet:3,sour:1,complex:6,

function loadCardImage(card, cocktailName) {
  const imgContainer = card.querySelector('.card-img');
  const url = cocktailImages[cocktailName];
  if (url) {
    imgContainer.innerHTML = `<img src="${url}" alt="${cocktailName}" style="width:100%;height:100%;object-fit:cover;display:block"><div class="card-img-overlay"></div>`;
  }
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
let activeFilter = "all";
let searchQuery = "";

function renderCocktails() {
  const main = document.getElementById("mainContent");
  main.innerHTML = "";

  const filtered = cocktails.filter(c => {
    const matchCat = activeFilter === "all" || c.category === activeFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = q === "" ||
      c.name.toLowerCase().includes(q) ||
      c.desc.toLowerCase().includes(q) ||
      c.ingredients.some(i => i.item.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    main.innerHTML = '<div class="no-results" dir="rtl">לא נמצאו קוקטיילים התואמים לחיפוש שלך.</div>';
    return;
  }

  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.category]) groups[c.category] = [];
    groups[c.category].push(c);
  });

  const catOrder = ["strong", "sweet", "sour", "fruity"];
  catOrder.forEach(cat => {
    if (!groups[cat]) return;
    const section = document.createElement("section");
    section.setAttribute('role', 'region');
    section.setAttribute('aria-label', categories[cat].name);
    section.innerHTML = `
      <div class="section-header">
        <h2 class="section-title">${categories[cat].name}</h2>
        <div class="section-count">${groups[cat].length} קוקטיילים</div>
      </div>
      <div class="cocktail-grid" id="grid-${cat}"></div>
    `;
    main.appendChild(section);

    const grid = section.querySelector(`#grid-${cat}`);
    groups[cat].forEach((c, i) => {
      const card = document.createElement("div");
      card.className = "cocktail-card";
      card.style.transitionDelay = `${i * 0.06}s`;

      const diffLabel = c.difficulty === "easy" ? "קל" : c.difficulty === "medium" ? "בינוני" : "מאתגר";

      const cardId = `card-${cat}-${i}`;
      const recipeId = `recipe-${cat}-${i}`;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-expanded', 'false');
      card.setAttribute('aria-controls', recipeId);
      card.id = cardId;

      card.innerHTML = `
        <div class="card-img">
          <div class="card-img-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 22h8"/><path d="M12 11v11"/><path d="m19 3-7 8-7-8h14z"/>
            </svg>
          </div>
        </div>
        <div class="card-body">
          <div class="card-top">
            <h3 class="card-name">${c.name}</h3>
            <div class="difficulty ${c.difficulty}">${diffLabel}</div>
          </div>
          <div class="card-desc" dir="rtl">${c.desc}</div>
          <div class="card-ingredients">
            ${c.ingredients.map(ig => `<span class="ingredient-tag">${ig.item}</span>`).join("")}
          </div>
          <div class="card-meters">
            <div class="meter">
              <div class="meter-label">מתיקות</div>
              <div class="meter-bar"><div class="meter-fill" style="--val:${c.sweet * 10}%"></div></div>
            </div>
            <div class="meter">
              <div class="meter-label">חמיצות</div>
              <div class="meter-bar"><div class="meter-fill" style="--val:${c.sour * 10}%"></div></div>
            </div>
            <div class="meter">
              <div class="meter-label">מורכבות</div>
              <div class="meter-bar"><div class="meter-fill" style="--val:${c.complex * 10}%"></div></div>
            </div>
          </div>
          <div class="card-recipe" id="${recipeId}">
            <div class="recipe-section-title">מרכיבים</div>
            <ul class="recipe-ingredients-list">
              ${c.ingredients.map(ig => `<li><span>${ig.item}</span><span class="amount">${ig.amount}</span></li>`).join("")}
            </ul>
            <div class="recipe-section-title">הכנה</div>
            <ol class="recipe-steps" dir="rtl">
              ${c.steps.map(s => `<li>${s}</li>`).join("")}
            </ol>
          </div>
        </div>
        <svg class="card-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      `;

      card.addEventListener("click", () => {
        const wasExpanded = card.classList.contains("expanded");
        document.querySelectorAll(".cocktail-card.expanded").forEach(el => {
          el.classList.remove("expanded");
          el.setAttribute('aria-expanded', 'false');
        });
        if (!wasExpanded) {
          card.classList.add("expanded");
          card.setAttribute('aria-expanded', 'true');
          setTimeout(() => {
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }, 350);
        }
      });

      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });

      grid.appendChild(card);
      // Load image async
      loadCardImage(card, c.name);
    });
  });

  observeCards();
}

// ═══════════════════════════════════════
//  INTERSECTION OBSERVER
// ═══════════════════════════════════════
function observeCards() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");
        entry.target.querySelectorAll(".meter-fill").forEach(fill => {
          setTimeout(() => fill.classList.add("loaded"), 300);
        });
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });

  document.querySelectorAll(".cocktail-card").forEach(card => observer.observe(card));
}

// ═══════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════
function scrollToCocktailList() {
  const mainEl = document.getElementById("mainContent");
  const navEl = document.querySelector(".nav-section");
  if (!mainEl) return;
  const navH = navEl ? navEl.offsetHeight : 0;
  const top = mainEl.getBoundingClientRect().top + window.scrollY - navH - 12;
  window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
}

document.querySelectorAll(".pill").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    activeFilter = pill.dataset.filter;
    renderCocktails();
    requestAnimationFrame(() => scrollToCocktailList());
  });
});

document.getElementById("searchInput").addEventListener("input", (e) => {
  searchQuery = e.target.value.trim();
  renderCocktails();
});

// Initial render
renderCocktails();
</script>

<!-- Back to Top Button -->
<button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="חזרה למעלה">↑</button>

<script>
// Back-to-top visibility
const backToTopBtn = document.querySelector('.back-to-top');
window.addEventListener('scroll', () => {
  if (window.scrollY > window.innerHeight) {
    backToTopBtn.classList.add('visible');
  } else {
    backToTopBtn.classList.remove('visible');
  }
});
</script>
